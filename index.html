<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SchoolPlatform</title>

  <!-- Load Inter early to avoid flash of fallback fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Force single OpenPython theme - no dark mode support -->
    <script>
      (function () {
        try {
          // Force single theme - remove any dark class and prevent browser preferences from affecting theme
          var root = document.documentElement;
          root.classList.remove("dark");
          root.style.colorScheme = "light";
          
          // Clean up any theme storage since we only use one theme now
          localStorage.removeItem("theme");
          
          console.debug('OpenPython Theme: Single theme enforced, dark mode disabled');
        } catch (e) {
          console.debug('Theme initialization error:', e);
        }
      })();
    </script>
  </head>
  <body data-app="lms" class="min-h-dvh bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
