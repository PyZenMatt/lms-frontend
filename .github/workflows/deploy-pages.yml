name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - feat/fe-refactor-openpython   
      
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Opzionale: se definisci una Repository Variable VITE_API_URL, verrà usata in build
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      # Forza produzione
      NPM_CONFIG_PRODUCTION: false
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add CNAME to dist
        run: |
          echo "corsi.openpython.it" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - id: deploy-pages
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
